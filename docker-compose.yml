services:

  postgres:
    image: postgres:15
    container_name: event_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8000"
    depends_on:
      - postgres

  event-service:
    build: ./event-service
    ports:
      - "8002:8000"
    depends_on:
      - postgres

  registration-service:
    build: ./registration-service
    ports:
      - "8003:8000"
    depends_on:
      - postgres

  notification-service:
    build: ./notification-service
    ports:
      - "8004:8000"

volumes:
  postgres_data: